<svg xmlns="http://www.w3.org/2000/svg" width="920" height="260" viewBox="0 0 920 260" role="img" aria-label="LINUS / LINUX5REAL">

  <style>
    .ui { font-family: 'Segoe UI', Arial, sans-serif; }
    .mono { font-family: 'IBM Plex Mono', 'JetBrains Mono', 'Fira Code', Consolas, monospace; }
    .display { font-family: 'Segoe UI', Arial, sans-serif; font-weight: 700; }
    .eyebrow { fill: #FAFAFA; font-size: 11px; font-weight: 700; letter-spacing: 2.4px; text-transform: uppercase; }
    .label { fill: #A8A8A8; font-size: 10px; letter-spacing: 1.6px; text-transform: uppercase; }
    .muted { fill: #8C8C8C; font-size: 11px; }
  </style>

  <defs>
    <linearGradient id="hero-bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#040404" />
      <stop offset="50%" stop-color="#0B0B0B" />
      <stop offset="100%" stop-color="#060606" />
    </linearGradient>
    <linearGradient id="hero-scan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0" />
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </linearGradient>
    <clipPath id="chart-clip">
      <rect x="554" y="94" width="312" height="118" />
    </clipPath>
    <clipPath id="canvas-clip">
      <rect width="920" height="260" rx="24" />
    </clipPath>
  </defs>

  <rect width="920" height="260" rx="24" fill="url(#hero-bg)" />
  <rect x="20" y="20" width="880" height="220" rx="18" fill="#080808" stroke="#2D2D2D" />
  <rect x="-220" y="20" width="220" height="220" fill="url(#hero-scan)" clip-path="url(#canvas-clip)">
    <animate attributeName="x" values="-220;920" dur="7s" repeatCount="indefinite" />
  </rect>
  <line x1="40" y1="42" x2="880" y2="42" stroke="#1F1F1F" />

  <text x="52" y="66" class="mono eyebrow">MARKET TERMINAL / EXECUTION DESK</text>
  <text x="52" y="112" class="display" fill="#FFFFFF" font-size="40">LINUS / LINUX5REAL</text>
  <text x="52" y="144" class="ui" fill="#D6D6D6" font-size="16">AI systems for stocks, signals, and live market context</text>
  <text x="52" y="170" class="mono" fill="#9E9E9E" font-size="12">SESSION TAPE :: NEWS / CHARTS / EXECUTION / MEMORY</text>
  <text x="52" y="192" class="mono" fill="#767676" font-size="11">Industrial market workflow with private telemetry rendered for public view.</text>

  <rect x="52" y="202" width="384" height="16" fill="#121212" rx="4" />
  <rect x="52" y="202" width="0" height="16" fill="#FFFFFF" fill-opacity="0.08" rx="4">
    <animate attributeName="width" values="0;384;384;0" dur="4.8s" repeatCount="indefinite" />
  </rect>
  <text x="64" y="214" class="mono" fill="#F3F3F3" font-size="11">SESSION TAPE | SIGNAL ROUTING | EXECUTION DISCIPLINE</text>
  <rect x="442" y="204" width="7" height="10" fill="#FFFFFF">
    <animate attributeName="opacity" values="1;1;0" dur="0.9s" repeatCount="indefinite" />
  </rect>

  <rect x="554" y="52" width="312" height="160" rx="14" fill="#060606" stroke="#262626" />
  <text x="576" y="80" class="mono eyebrow">LIVE MARKET GRID</text>
  <line x1="576" y1="92" x2="846" y2="92" stroke="#1E1E1E" />
  <g clip-path="url(#chart-clip)">
    <path d="M580 182 L616 158 L652 168 L688 134 L724 142 L760 114 L796 124 L832 86"
          fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="616" cy="158" r="4" fill="#7A7A7A" />
    <circle cx="724" cy="142" r="4" fill="#CFCFCF" />
    <circle cx="832" cy="86" r="4" fill="#FFFFFF" />
  </g>
  <text x="576" y="120" class="ui label">US EQUITIES</text>
  <text x="672" y="120" class="ui label">ROUTING</text>
  <text x="768" y="120" class="ui label">SYSTEMS</text>
  <text x="576" y="202" class="ui muted">Monochrome trading desk identity for GitHub profile telemetry.</text>
</svg>
