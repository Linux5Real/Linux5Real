<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" role="img" aria-label="LINUS / LINUX5REAL">
  
  <style>
    .ui { font-family: 'Segoe UI', Arial, sans-serif; }
    .mono { font-family: 'IBM Plex Mono', 'JetBrains Mono', 'Fira Code', Consolas, monospace; }
    .display { font-family: 'Segoe UI', Arial, sans-serif; font-weight: 700; }
    .eyebrow { fill: #FAFAFA; font-size: 12px; font-weight: 700; letter-spacing: 2.4px; text-transform: uppercase; }
    .title { fill: #FAFAFA; font-size: 31px; font-weight: 700; }
    .subtitle { fill: #D4D4D4; font-size: 15px; }
    .label { fill: #A8A8A8; font-size: 11px; letter-spacing: 1.8px; text-transform: uppercase; }
    .value { fill: #FFFFFF; font-size: 28px; font-weight: 700; }
    .muted { fill: #8C8C8C; font-size: 12px; }
    .grid-label { fill: #9E9E9E; font-size: 11px; }
  </style>

  <defs>
    <linearGradient id="hero-bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#040404" />
      <stop offset="50%" stop-color="#0B0B0B" />
      <stop offset="100%" stop-color="#060606" />
    </linearGradient>
    <linearGradient id="hero-scan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0" />
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </linearGradient>
  </defs>
  <rect width="1280" height="320" rx="28" fill="url(#hero-bg)" />
  <rect x="24" y="24" width="1232" height="272" rx="22" fill="#080808" stroke="#2D2D2D" />
  <rect x="-280" y="24" width="280" height="272" fill="url(#hero-scan)">
    <animate attributeName="x" values="-280;1280" dur="7s" repeatCount="indefinite" />
  </rect>
  <line x1="48" y1="48" x2="1232" y2="48" stroke="#1F1F1F" />
  <text x="68" y="78" class="mono eyebrow">MARKET TERMINAL / EXECUTION DESK</text>
  <text x="68" y="132" class="display" fill="#FFFFFF" font-size="50">LINUS / LINUX5REAL</text>
  <text x="68" y="170" class="ui" fill="#D6D6D6" font-size="20">AI systems for stocks, signals, and live market context</text>
  <text x="68" y="206" class="mono" fill="#9E9E9E" font-size="13">SESSION TAPE :: NEWS / CHARTS / EXECUTION / MEMORY</text>
  <text x="68" y="232" class="mono" fill="#767676" font-size="12">Industrial market workflow with private telemetry rendered for public view.</text>
  <rect x="68" y="244" width="534" height="18" fill="#121212" rx="4" />
  <rect x="68" y="244" width="0" height="18" fill="#FFFFFF" fill-opacity="0.08" rx="4">
    <animate attributeName="width" values="0;534;534;0" dur="4.8s" repeatCount="indefinite" />
  </rect>
  <text x="82" y="257" class="mono" fill="#F3F3F3" font-size="12">SESSION TAPE | SIGNAL ROUTING | EXECUTION DISCIPLINE</text>
  <rect x="590" y="246" width="8" height="12" fill="#FFFFFF">
    <animate attributeName="opacity" values="1;1;0" dur="0.9s" repeatCount="indefinite" />
  </rect>

  <rect x="760" y="72" width="436" height="176" rx="16" fill="#060606" stroke="#262626" />
  <text x="788" y="102" class="mono eyebrow">LIVE MARKET GRID</text>
  <line x1="788" y1="116" x2="1168" y2="116" stroke="#1E1E1E" />
  <path d="M800 220 L848 192 L896 204 L944 162 L992 172 L1040 136 L1088 150 L1136 104" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
  <circle cx="848" cy="192" r="5" fill="#7A7A7A" />
  <circle cx="992" cy="172" r="5" fill="#CFCFCF" />
  <circle cx="1136" cy="104" r="5" fill="#FFFFFF" />
  <text x="788" y="148" class="ui label">US EQUITIES</text>
  <text x="928" y="148" class="ui label">SIGNAL ROUTING</text>
  <text x="1082" y="148" class="ui label">PRIVATE SYSTEMS</text>
  <text x="788" y="242" class="ui muted">Monochrome trading desk identity built for GitHub profile telemetry.</text>
</svg>
